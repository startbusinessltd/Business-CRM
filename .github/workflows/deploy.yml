name: Deploy Business CRM

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: businesscrm-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Prepare deployment artifact
        run: |
          mkdir -p deploy-artifact
          rsync -a dist/ deploy-artifact/

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: businesscrm-client
          path: deploy-artifact
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: businesscrm-client
          path: deploy-artifact

      - name: Configure SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/businesscrm
          chmod 600 ~/.ssh/businesscrm
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to production
        shell: bash
        env:
          BUILD_DIR: deploy-artifact
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY_PATH: /home/runner/.ssh/businesscrm
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_APP_PORT: ${{ secrets.DEPLOY_APP_PORT }}
          WEB_SERVER: ${{ secrets.WEB_SERVER }}
          NGINX_SITE_PATH: ${{ secrets.NGINX_SITE_PATH }}
        run: bash scripts/deploy.sh

      - name: Verify deployment
        shell: bash
        run: |
          for attempt in {1..12}; do
            if curl --fail --silent --show-error http://${{ secrets.DEPLOY_HOST }} > /dev/null; then
              exit 0
            fi
            echo "Waiting for application startup... ($attempt/12)"
            sleep 10
          done
          exit 1
